{% extends "home/base_portal.html" %}
{% block title %}Stremet | New Quote{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-8">
<h1 class="h3 mb-3" style="color:var(--st-sales)">Create quote</h1>
<div class="card shadow-sm"><div class="card-body p-4">
<form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label fw-semibold">Customer *</label>
    <select name="customer" class="form-select" required>
        <option value="">— select —</option>
        {% for c in customers %}<option value="{{ c.id }}">{{ c.company_name }}</option>{% endfor %}
    </select></div>
    <div class="mb-3"><label class="form-label fw-semibold">Title</label>
    <input type="text" name="title" class="form-control" placeholder="e.g. Side Panel Production Run"></div>
    <div class="mb-3"><label class="form-label fw-semibold">Manufacturing plan (optional)</label>
    <select name="preliminary_manufacturing_plan" class="form-select">
        <option value="">— none —</option>
        {% for p in plans %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}
    </select></div>
    <hr><h2 class="h6 text-muted">First line item (optional)</h2>
    <div class="row g-3 mb-3">
        <div class="col-md-6"><label class="form-label">Description</label>
        <input type="text" name="line_description" class="form-control" placeholder="e.g. Steel panel 100x200mm"></div>
        <div class="col-md-3"><label class="form-label">Quantity</label>
        <input type="number" name="line_quantity" class="form-control" step="0.01" placeholder="100"></div>
        <div class="col-md-3"><label class="form-label">Unit price</label>
        <input type="number" name="line_unit_price" class="form-control" step="0.01" placeholder="24.50"></div>
    </div>
    <div class="d-flex gap-2"><button class="btn btn-primary">Create quote</button>
    <a href="{% url 'portal_sales' %}" class="btn btn-outline-secondary">Cancel</a></div>
</form>
</div></div></div></div>
{% endblock %}
