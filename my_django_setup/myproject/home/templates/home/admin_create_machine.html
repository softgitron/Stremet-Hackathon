{% extends "home/base_portal.html" %}
{% block title %}Stremet | New Machine{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-7">
<h1 class="h3 mb-3" style="color:var(--st-admin)">Register machine</h1>
<div class="card shadow-sm"><div class="card-body p-4">
<form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label fw-semibold">Identifier *</label>
    <input type="text" name="identifier" class="form-control" required placeholder="e.g. LASER-01"></div>
    <div class="mb-3"><label class="form-label fw-semibold">Name</label>
    <input type="text" name="name" class="form-control" placeholder="e.g. Trumpf TruLaser 1030"></div>
    <div class="mb-3"><label class="form-label fw-semibold">Machine type *</label>
    <input type="text" name="machine_type" class="form-control" required placeholder="e.g. laser, press, paint"></div>
    <div class="mb-3"><label class="form-label fw-semibold">Capacity (hours/day)</label>
    <input type="number" name="capacity_hours_per_day" class="form-control" value="8" step="0.5"></div>
    <div class="d-flex gap-2"><button class="btn btn-primary">Register machine</button>
    <a href="{% url 'portal_admin' %}" class="btn btn-outline-secondary">Cancel</a></div>
</form>
</div></div></div></div>
{% endblock %}
