{% extends "home/base_portal.html" %}
{% block title %}Stremet | Adjust Stock{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-7">
<h1 class="h3 mb-3" style="color:var(--st-wh)">Adjust stock: {{ item.sku }}</h1>
<p class="text-muted">{{ item.name }} — current quantity: <strong>{{ item.quantity|floatformat:2 }} {{ item.unit }}</strong></p>
<div class="card shadow-sm"><div class="card-body p-4">
<form method="post">{% csrf_token %}
    <div class="row g-3 mb-3">
        <div class="col-md-4"><label class="form-label fw-semibold">Quantity delta *</label>
        <input type="number" name="quantity_delta" class="form-control" step="0.01" required placeholder="e.g. 50 or -10"></div>
        <div class="col-md-4"><label class="form-label fw-semibold">Movement type</label>
        <select name="movement_type" class="form-select">
            <option value="inbound">Inbound</option><option value="outbound">Outbound</option><option value="adjust">Adjustment</option>
        </select></div>
        <div class="col-md-4"><label class="form-label fw-semibold">Reference</label>
        <input type="text" name="reference" class="form-control" placeholder="e.g. PO-12345"></div>
    </div>
    <div class="d-flex gap-2"><button class="btn btn-primary">Apply adjustment</button>
    <a href="{% url 'portal_warehouse' %}" class="btn btn-outline-secondary">Cancel</a></div>
</form>
</div></div></div></div>
{% endblock %}
