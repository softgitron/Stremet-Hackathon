<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteelForge | Admin Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .admin-header { background-color: #2c3e50; color: white; padding: 20px 0; }
        .section-card { margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="admin-header mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <h2 class="mb-0">Administrator Portal - New Order Entry</h2>
        <a href="{% url 'manufacturer_dashboard' %}" class="btn btn-outline-light">Back to Dashboard</a>
    </div>
</div>

<div class="container">
    <form action="{% url 'admin_panel' %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="row">
            <div class="col-lg-7">
                
                <div class="card section-card">
                    <div class="card-header bg-light fw-bold">1. Client & Order Details</div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Order ID (Auto-generated or Manual)</label>
                                <input type="text" class="form-control" name="order_id" placeholder="e.g., ORD-2026-8991"  >
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Client Company</label>
                                <input type="text" class="form-control" name="company_name" placeholder="e.g., Apex Construction"  >
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Contact Email</label>
                                <input type="email" class="form-control" name="client_email"  >
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Target Delivery Date</label>
                                <input type="date" class="form-control" name="target_delivery"  >
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card section-card">
                    <div class="card-header bg-light fw-bold">2. Technical Specifications</div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Steel Grade</label>
                                <select class="form-select" name="steel_grade">
                                    <option value="304_ss">304 Stainless Steel</option>
                                    <option value="316_ss">316 Marine Grade Stainless</option>
                                    <option value="a36_carbon">A36 Mild Carbon Steel</option>
                                    <option value="d2_tool">D2 Tool Steel</option>
                                    <option value="custom">Custom Alloy</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Product Form</label>
                                <select class="form-select" name="product_form">
                                    <option value="plate">Plate / Sheet</option>
                                    <option value="coil">Rolled Coil</option>
                                    <option value="bar">Structural Bar</option>
                                    <option value="tube">Seamless Tubing</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Thickness (mm)</label>
                                <input type="number" step="0.01" class="form-control" name="dim_thickness">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Width (mm)</label>
                                <input type="number" step="0.01" class="form-control" name="dim_width">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Length (mm)</label>
                                <input type="number" step="0.01" class="form-control" name="dim_length">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Total Quantity (Metric Tons)</label>
                                <input type="number" step="0.1" class="form-control" name="quantity_tons"  >
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Surface Finish</label>
                                <select class="form-select" name="surface_finish">
                                    <option value="hot_rolled">Hot Rolled (HR)</option>
                                    <option value="cold_rolled">Cold Rolled (CR)</option>
                                    <option value="pickled">Pickled & Oiled</option>
                                    <option value="polished">Polished (Mirror/Brushed)</option>
                                </select>
                            </div>
                        </div>
                        
                        <hr class="my-4">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold d-block">  Processing & Testing</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" name="heat_treatment" value="yes">
                                <label class="form-check-label">Heat Treatment</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" name="ultrasonic_test" value="yes">
                                <label class="form-check-label">Ultrasonic Testing</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" name="mill_certificate" value="yes">
                                <label class="form-check-label">Mill Test Certificate (MTC)</label>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="col-lg-5">
                
                <div class="card section-card">
                    <div class="card-header bg-light fw-bold">3. Blueprints & Reference Pictures</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Upload CAD Blueprints (.pdf, .dwg)</label>
                            <input class="form-control" type="file" name="blueprint_file" accept=".pdf,.dwg,.dxf">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Reference Pictures (Defect examples, part photos)</label>
                            <input class="form-control" type="file" name="reference_images" accept="image/*" multiple>
                            <div class="form-text">You can select multiple images by holding Ctrl/Cmd.</div>
                        </div>
                    </div>
                </div>

                <div class="card section-card">
                    <div class="card-header bg-light fw-bold">4. Additional Notes</div>
                    <div class="card-body">
                        <textarea class="form-control" name="admin_notes" rows="5" placeholder="Enter any special manufacturing instructions, packaging requirements, or shipping logistics here..."></textarea>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success btn-lg">Generate Manufacturing Order</button>
                </div>

            </div>
        </div>
    </form>
</div>

</body>
</html>
