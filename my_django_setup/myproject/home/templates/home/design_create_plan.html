{% extends "home/base_portal.html" %}
{% block title %}Stremet | New Plan{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-7">
<h1 class="h3 mb-3" style="color:var(--st-design)">New manufacturing plan</h1>
<div class="card shadow-sm"><div class="card-body p-4">
<form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label fw-semibold">Plan name *</label>
    <input type="text" name="name" class="form-control" required placeholder="e.g. Side Panel Process"></div>
    <div class="mb-3"><label class="form-label fw-semibold">Part (optional)</label>
    <select name="part" class="form-select">
        <option value="">— none —</option>
        {% for p in parts %}<option value="{{ p.id }}">{{ p.name }} ({{ p.customer.company_name }})</option>{% endfor %}
    </select></div>
    <div class="d-flex gap-2"><button class="btn btn-primary">Create plan</button>
    <a href="{% url 'portal_design' %}" class="btn btn-outline-secondary">Cancel</a></div>
</form>
</div></div></div></div>
{% endblock %}
