{% extends "home/base_portal.html" %}
{% block title %}Stremet | New Design Block{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-7">
<h1 class="h3 mb-3" style="color:var(--st-design)">New design block</h1>
<div class="card shadow-sm"><div class="card-body p-4">
<form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label fw-semibold">Name *</label>
    <input type="text" name="name" class="form-control" required placeholder="e.g. Laser Cutting"></div>
    <div class="mb-3"><label class="form-label fw-semibold">Description</label>
    <textarea name="description" class="form-control" rows="2" placeholder="Reusable step template for..."></textarea></div>
    <div class="row g-3 mb-3">
        <div class="col-md-6"><label class="form-label fw-semibold">Default machine type</label>
        <input type="text" name="default_machine_type" class="form-control" placeholder="e.g. laser"></div>
        <div class="col-md-6"><label class="form-label fw-semibold">Version tag</label>
        <input type="text" name="version_tag" class="form-control" value="1.0.0"></div>
    </div>
    <div class="d-flex gap-2"><button class="btn btn-primary">Create block</button>
    <a href="{% url 'portal_design' %}" class="btn btn-outline-secondary">Cancel</a></div>
</form>
</div></div></div></div>
{% endblock %}
