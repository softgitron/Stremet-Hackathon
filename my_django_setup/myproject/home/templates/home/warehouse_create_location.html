{% extends "home/base_portal.html" %}
{% block title %}Stremet | New Location{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-7">
<h1 class="h3 mb-3" style="color:var(--st-wh)">New warehouse location</h1>
<div class="card shadow-sm"><div class="card-body p-4">
<form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label fw-semibold">Code *</label>
    <input type="text" name="code" class="form-control" required placeholder="e.g. A-01"></div>
    <div class="mb-3"><label class="form-label fw-semibold">Name</label>
    <input type="text" name="name" class="form-control" placeholder="e.g. Aisle A Shelf 1"></div>
    <div class="d-flex gap-2"><button class="btn btn-primary">Create location</button>
    <a href="{% url 'portal_warehouse' %}" class="btn btn-outline-secondary">Cancel</a></div>
</form>
</div></div></div></div>
{% endblock %}
