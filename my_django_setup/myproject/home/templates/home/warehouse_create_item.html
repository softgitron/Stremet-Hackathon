{% extends "home/base_portal.html" %}
{% block title %}Stremet | New Inventory Item{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-7">
<h1 class="h3 mb-3" style="color:var(--st-wh)">New inventory item</h1>
<div class="card shadow-sm"><div class="card-body p-4">
<form method="post">{% csrf_token %}
    <div class="row g-3 mb-3">
        <div class="col-md-4"><label class="form-label fw-semibold">SKU *</label>
        <input type="text" name="sku" class="form-control" required placeholder="e.g. STL-2MM"></div>
        <div class="col-md-8"><label class="form-label fw-semibold">Name *</label>
        <input type="text" name="name" class="form-control" required placeholder="e.g. Steel Sheet 2mm"></div>
    </div>
    <div class="mb-3"><label class="form-label fw-semibold">Location *</label>
    <select name="location" class="form-select" required>
        <option value="">— select —</option>
        {% for l in locations %}<option value="{{ l.id }}">{{ l.code }} — {{ l.name }}</option>{% endfor %}
    </select></div>
    <div class="row g-3 mb-3">
        <div class="col-md-4"><label class="form-label fw-semibold">Quantity</label>
        <input type="number" name="quantity" class="form-control" value="0" step="0.01"></div>
        <div class="col-md-4"><label class="form-label fw-semibold">Unit</label>
        <input type="text" name="unit" class="form-control" value="pcs"></div>
        <div class="col-md-4"><label class="form-label fw-semibold">Unit cost</label>
        <input type="number" name="unit_cost" class="form-control" value="0" step="0.01"></div>
    </div>
    <div class="mb-3"><label class="form-label fw-semibold">Batch / Lot</label>
    <input type="text" name="batch_or_lot" class="form-control" placeholder="Optional"></div>
    <div class="d-flex gap-2"><button class="btn btn-primary">Create item</button>
    <a href="{% url 'portal_warehouse' %}" class="btn btn-outline-secondary">Cancel</a></div>
</form>
</div></div></div></div>
{% endblock %}
